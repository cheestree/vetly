name: vetly

services:
  client:
    build: ./client
    container_name: vetly-client
    restart: unless-stopped
    init: true
    env_file:
      - ./client/.env.docker
    environment:
      EXPO_NO_TELEMETRY: 1
      WEB_HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${CLIENT_HOST_PORT:-8081}:8081"
      - "${EXPO_HOST_PORT:-19000}:19000"
      - "${EXPO_DEVTOOLS_HOST_PORT:-19001}:19001"
      - "${EXPO_METRO_HOST_PORT:-19002}:19002"
    volumes:
      - ./client:/app
    networks:
      - spring-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: ./server
    container_name: vetly-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "${WEB_HOST_PORT}:${PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      FIREBASE_CREDENTIALS_PATH: /app/config/serviceAccount.json
      BUCKET_NAME: ${BUCKET_NAME}
      PORT: ${PORT}
      JAVA_OPTS: ${JAVA_OPTS}
    volumes:
      - ./server/src/main/resources/serviceAccount.json:/app/config/serviceAccount.json:ro
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - spring-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  redis:
    image: redis:7-alpine
    container_name: vetly-redis
    restart: unless-stopped
    init: true
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - spring-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  database:
    image: postgres:16-alpine
    container_name: vetly-database
    restart: unless-stopped
    init: true
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${DB_HOST_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./sql/createTable.sql:/docker-entrypoint-initdb.d/01-createTable.sql:ro
      - ./sql/insertTable.sql:/docker-entrypoint-initdb.d/02-insertTable.sql:ro
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spring-network
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  tests:
    build:
      context: ./server
      target: build
    container_name: vetly-backend-tests
    command: ["./gradlew", "test", "--no-daemon"]
    environment:
      SPRING_PROFILES_ACTIVE: test
    networks:
      - spring-network
    profiles:
      - test
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  spring-network:
